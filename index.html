        <script>
            function updateSong(){
                getSong(function(artist, title, nowplaying, lastfm_url) {
                    if (nowplaying === "true") {
			    $("#live-dot").fadeIn(500); // Fade in with 500ms duration
			    $("#live-message").text("Currently playing:").fadeIn(500); // Fade in with 500ms duration
			} else {
			    $("#live-dot").fadeOut(500); // Fade out with 500ms duration
			    $("#live-message").html("Was listening to:").fadeIn(500); // Fade in with 500ms duration
			}

                    if (artist.length > 25) {
                        if (artist[22] == " ") {
                            artist = artist.substring(0,21) + "..."
                        }
                        else {
                            artist = artist.substring(0,22) + "...";
                        }
                    };

                    if (title.length > 25) {
                        if (title[22] == " ") {
                            title = title.substring(0,21) + "..."
                        } else {
                            title = title.substring(0,22) + "...";
                        }
                    };

                    $("#artist").text(artist);
                    $("#song").text(title);
                    // if lastfm gives back a javascript: url its over..
                    $("#lastfm-url").attr("href", lastfm_url);
                }, "solo68");
            }
            
            updateSong();
            setInterval(function(){
                updateSong();
            }, 4000);
        </script>
